<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創作wall</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iansui&family=Ma+Shan+Zheng&family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@400;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Noto Serif TC', "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

	/* 返回主頁按鈕樣式 */
	.back-home-button {
    	position: fixed;
    	top: 20px;
    	left: 20px;
    	z-index: 1000;
    	padding: 10px 15px;
    	background-color: rgba(255, 255, 255, 0.8);
    	color: #333;
    	text-decoration: none;
    	border-radius: 50px;
    	font-size: 14px;
    	box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    	transition: all 0.3s ease;
    	border: 1px solid #ddd;
    	display: flex;
    	align-items: center;
    	gap: 5px;
	}	

	.back-home-button:hover {
  	background-color: #fff;
	box-shadow: 0 4px 10px rgba(0,0,0,0.15);
	transform: translateY(-2px);
	}
        .wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        /* 字體設定 */
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .font-sans  { font-family: 'Noto Sans TC', sans-serif; }
        .font-poem  { font-family: 'Zhi Mang Xing', cursive; }
        .font-brush { font-family: 'Ma Shan Zheng', cursive; }
	.font-iansui { font-family: 'Iansui', serif; } /* 這是芫荽專屬的 */

        /* 便利貼基本設定 */
        .post-it {
            padding: 25px;
            height: fit-content;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s, z-index 0s;
            word-wrap: break-word;
        }

        .post-it:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 8px 8px 25px rgba(0,0,0,0.15);
            z-index: 10;
        }

        .post-it p { 
            font-size: 1.1em; 
            line-height: 1.6; 
            margin-bottom: 0; 
            white-space: pre-wrap; 
        }

        .date {
            font-size: 0.8em;
            color: #666;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 10px;
            display: block;
        }

        h2 { font-size: 1.2em; margin-top: 0; }

        /* 顏色與旋轉角度 */
        .yellow { background-color: #fff9c4; transform: rotate(-2deg); }
        .blue   { background-color: #e3f2fd; transform: rotate(1.5deg); }
        .pink   { background-color: #fce4ec; transform: rotate(-1deg); }
        .green  { background-color: #e8f5e9; transform: rotate(2deg); }
        .purple { background-color: #f3e5f5; transform: rotate(-1.5deg); }

        /* 寬版便利貼設定 */
        .large-note {
            grid-column: span 2; 
        }
    </style>
</head>
<body>
    <a href="../" class="back-home-button">🏠 返回主頁</a>

    <div class="wall">
        
        <div class="post-it blue font-iansui normal" style="width: 260px;">
            <span class="date">2026-04-12</span>
            <h2>day1</h2>
            <p>昨天熬夜到兩點，<br>今天總算是把我的網站兒架出來了<br>也算是這個周末沒唸書的交代<br>我要去排下禮拜的行程啦</p>
        </div>
    
    </div>

</body>
</html>
