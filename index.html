<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的靈感便利貼</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Noto Serif TC',"PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }
        /* 便利貼基本樣式 */
        .post-it {
            padding: 25px;
            min-height: 200px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            position: relative;
            transition: transform 0.2s;
            line-height: 1.6;
        }
        .post-it:hover {
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 10;
        }
        /* 不同顏色的便利貼 */
        .yellow { background-color: #fff9c4; transform: rotate(-2deg); }
        .blue   { background-color: #e3f2fd; transform: rotate(1.5deg); }
        .pink   { background-color: #fce4ec; transform: rotate(-1deg); }
        
        .date {
            font-size: 0.8em;
            color: #666;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 10px;
            display: block;
        }
        h2 { font-size: 1.2em; margin-top: 0; }
        p { margin-bottom: 0; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="wall">
    <div class="post-it yellow">
        <span class="date">2026-04-11</span>
        <h2>〈時光微粒〉</h2>
        <p>窗沿落下的光
被切成了
極小極小的
回憶片段。</p>
    </div>

    <div class="post-it blue">
        <span class="date">2026-04-11</span>
        <h2>物理隨筆</h2>
        <p>今天思考了熵增原理：
$$dS \ge \frac{dQ}{T}$$
或許情感也是一種不可逆的過程。</p>
    </div>

    <div class="post-it pink">
        <span class="date">2026-04-10</span>
        <h2>《未竟之城》碎片</h2>
        <p>他在巷口停下，
那種便利貼般的記憶
又重新貼回了牆面。</p>
    </div>
</div>

</body>
</html>
