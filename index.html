<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的靈感便利貼</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;700&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Noto Serif TC', "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .font-sans  { font-family: 'Noto Sans TC', sans-serif; }
        .font-poem  { font-family: 'Zhi Mang Xing', cursive; }
        .font-brush { font-family: 'Ma Shan Zheng', cursive; }
        .post-it {
            padding: 25px;
            height: fit-content;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s, z-index 0s;
            word-wrap: break-word;
        }
        .post-it:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 8px 8px 25px rgba(0,0,0,0.15);
            z-index: 10;
        }
        .post-it p { font-size: 1.1em; line-height: 1.6; margin-bottom: 0; white-space: pre-wrap; }
        .date { font-size: 0.8em; color: #666; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 10px; display: block; }
        h2 { font-size: 1.2em; margin-top: 0; }
        .yellow { background-color: #fff9c4; transform: rotate(-2deg); }
        .blue   { background-color: #e3f2fd; transform: rotate(1.5deg); }
        .pink   { background-color: #fce4ec; transform: rotate(-1deg); }
        .green  { background-color: #e8f5e9; transform: rotate(2deg); }
        .purple { background-color: #f3e5f5; transform: rotate(-1.5deg); }
        .large-note { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="wall">
        
    <div class="post-it pink font-serif ">
        <span class="date">2026-04-12</span>
        <h2>買尬</h2>
        <p>我在測試</p>
    </div>

    <div class="post-it yellow font-serif ">
        <span class="date">2026-04-12</span>
        <h2>說</h2>
        <p>槍ㄤㄑ七ㄤ</p>
    </div>

    <div class="post-it yellow font-serif ">
        <span class="date">2026-04-12</span>
        <h2>測試是是是是</h2>
        <p>2135456</p>
    </div>

    <div class="post-it yellow font-serif ">
        <span class="date">2026-04-12</span>
        <h2>我的天</h2>
        <p>測試測試</p>
    </div>

    <div class="post-it yellow font-serif ">
        <span class="date">2026-04-12</span>
        <h2>6666</h2>
        <p>262151511邱</p>
    </div>

    <div class="post-it yellow font-serif ">
        <span class="date">2026-04-12</span>
        <h2>45465</h2>
        <p>2661</p>
    </div>

    <div class="post-it yellow font-serif ">
        <span class="date">2026-04-12</span>
        <h2>222</h2>
        <p>1515115</p>
    </div>

    </div>
</body>
</html>
