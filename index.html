<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diego 的個人首頁</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10vh;
        }

        /* 頭像區塊 (你可以換成自己的照片) */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            object-fit: cover;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: #555;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 1.8em;
        }

        p.bio {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
            text-align: center;
            max-width: 80%;
        }

        /* 連結按鈕區塊 */
        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        a.link-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: rgba(255, 255, 255, 0.7);
            color: #333;
            text-decoration: none;
            text-align: center;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1em;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        a.link-btn:hover {
            transform: translateY(-3px);
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* 社群圖示區塊 (選用) */
        .social-icons {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }
        
        .social-icons a {
            color: #555;
            text-decoration: none;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="profile-img">💡</div>

    <h1>Diego</h1>
    <p class="bio">welcome</p>

    <div class="links-container">
        <a href="./wall/" class="link-btn">🤍 wall </a>
        <a href="./wall/daily/" class="link-btn"> diary </a>
        <a href="./schedule/" class="link-btn">📌 schedule </a>
       
    </div>

    <div class="social-icons">
        <a href="https://github.com/diegolaumm" target="_blank">GitHub</a>
        <a href="#">Instagram</a>
    </div>

</body>
</html>
